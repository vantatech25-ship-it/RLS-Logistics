<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RLS Logistics — Living Neural Network Digital Twin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet" />
  <script async src="assets/es-module-shims.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #050a18;
      --panel:    rgba(10, 20, 50, 0.85);
      --border:   rgba(0, 200, 255, 0.2);
      --accent:   #00c8ff;
      --green:    #00ff9d;
      --orange:   #ff8c00;
      --red:      #ff3b5c;
      --text:     #cde8ff;
      --muted:    #5a7a9a;
    }

    body {
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      overflow: hidden;
      height: 100vh;
    }

    #twin-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: rgba(5, 10, 24, 0.92);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    header .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(0,200,255,0.6);
    }

    header .status-pills {
      display: flex;
      gap: 10px;
    }

    .pill {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .pill.online  { background: rgba(0,255,157,0.15); color: var(--green); border: 1px solid var(--green); }
    .pill.loading { background: rgba(255,140,0,0.15);  color: var(--orange); border: 1px solid var(--orange); }

    #side-panel {
      position: fixed;
      top: 72px;
      left: 16px;
      width: 300px;
      max-height: calc(100vh - 88px);
      overflow-y: auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      z-index: 100;
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    #side-panel::-webkit-scrollbar { width: 4px; }
    #side-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .panel-section h3 {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .hub-card {
      background: rgba(0, 200, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .hub-card:hover { border-color: var(--accent); background: rgba(0,200,255,0.08); }
    .hub-card.active { border-color: var(--accent); box-shadow: 0 0 12px rgba(0,200,255,0.25); }

    .hub-card .hub-name { font-weight: 600; font-size: 0.85rem; margin-bottom: 6px; }
    .hub-card .hub-stats { display: flex; gap: 8px; flex-wrap: wrap; }

    .stat-badge {
      font-size: 0.68rem;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 600;
    }
    .stat-badge.load  { background: rgba(0,200,255,0.12); color: var(--accent); }
    .stat-badge.cong  { background: rgba(255,60,92,0.12);  color: var(--red); }
    .stat-badge.conn  { background: rgba(0,255,157,0.12);  color: var(--green); }

    /* Route form */
    .route-form { display: flex; flex-direction: column; gap: 8px; }
    .route-form select, .route-form button {
      width: 100%;
      padding: 9px 12px;
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
    }
    .route-form select {
      background: rgba(0,200,255,0.06);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .route-form button {
      background: linear-gradient(135deg, #0066cc, #00c8ff);
      color: #fff;
      font-weight: 700;
      border: none;
      cursor: pointer;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: opacity 0.2s, transform 0.1s;
    }
    .route-form button:hover   { opacity: 0.88; }
    .route-form button:active  { transform: scale(0.97); }

    #route-result {
      margin-top: 4px;
      background: rgba(0,255,157,0.05);
      border: 1px solid rgba(0,255,157,0.2);
      border-radius: 8px;
      padding: 10px 12px;
      display: none;
    }
    #route-result .result-row { font-size: 0.78rem; margin-bottom: 4px; display: flex; justify-content: space-between; }
    #route-result .result-row span:last-child { font-weight: 600; color: var(--green); }

    #activity-log {
      max-height: 120px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #activity-log::-webkit-scrollbar { width: 3px; }
    #activity-log::-webkit-scrollbar-thumb { background: var(--border); }

    .log-entry {
      font-size: 0.7rem;
      color: var(--muted);
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      animation: fadeIn 0.4s ease;
    }
    .log-entry .ts { color: var(--accent); margin-right: 6px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: none; } }

    #hub-tooltip {
      position: fixed;
      pointer-events: none;
      background: var(--panel);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.78rem;
      min-width: 160px;
      z-index: 200;
      display: none;
      backdrop-filter: blur(10px);
    }
    #hub-tooltip h4 { color: var(--accent); margin-bottom: 6px; font-size: 0.82rem; }
    #hub-tooltip p  { margin: 2px 0; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
    }
  }
  </script>
</head>
<body>

<canvas id="twin-canvas"></canvas>

<header>
  <span class="logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 8px;"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
    RLS LOGISTICS — DIGITAL TWIN
  </span>
  <div class="status-pills">
    <span class="pill online" id="engine-pill">● SIMULATION MODE v1.2.1</span>
    <span class="pill online" id="memory-pill">● LIVE MOCK SERVER</span>
  </div>
</header>

<div id="side-panel">

  <div class="panel-section">
    <h3>Live Hub Network</h3>
    <div id="hub-list"></div>
  </div>

  <div class="panel-section">
    <h3>Dispatch Route (GNN)</h3>
    <div class="route-form">
      <select id="from-hub">
        <option value="JHB">Johannesburg Hub</option>
        <option value="CPT">Cape Town Hub</option>
        <option value="DBN">Durban Hub</option>
        <option value="PE">Gqeberha Hub</option>
      </select>
      <select id="to-hub">
        <option value="CPT">Cape Town Hub</option>
        <option value="JHB">Johannesburg Hub</option>
        <option value="DBN">Durban Hub</option>
        <option value="PE">Gqeberha Hub</option>
      </select>
      <button onclick="dispatchRoute()">⟳ Compute GNN Route</button>
    </div>
    <div id="route-result">
      <div class="result-row"><span>Route</span><span id="res-route">—</span></div>
      <div class="result-row"><span>Predicted Cost</span><span id="res-cost">—</span></div>
      <div class="result-row"><span>GNN Confidence</span><span id="res-conf">—</span></div>
      <div class="result-row"><span>Adjustment</span><span id="res-adj">—</span></div>
    </div>
  </div>

  <div class="panel-section">
    <h3>Agent Activity Log</h3>
    <div id="activity-log"></div>
  </div>

</div>

<div id="hub-tooltip">
  <h4 id="tt-name">—</h4>
  <p>Load: <strong id="tt-load">—</strong></p>
  <p>Congestion: <strong id="tt-cong">—</strong></p>
  <p>Connectivity: <strong id="tt-conn">—</strong></p>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const API_BASE = "http://localhost:8000/api";

const HUBS = {
  JHB: { name: "Johannesburg Hub", lat: -26.2041, lon:  28.0473, load: 0.75, cong: 0.51, conn: 3 },
  CPT: { name: "Cape Town Hub",    lat: -33.9249, lon:  18.4241, load: 0.55, cong: 0.39, conn: 2 },
  DBN: { name: "Durban Hub",       lat: -29.8587, lon:  31.0218, load: 0.80, cong: 0.55, conn: 2 },
  PE:  { name: "Gqeberha Hub",     lat: -33.9608, lon:  25.6022, load: 0.40, cong: 0.30, conn: 3 },
};

const EDGES = [
  ["JHB","CPT"], ["JHB","DBN"], ["JHB","PE"],
  ["CPT","PE"],  ["DBN","PE"],
];

const RADIUS = 5;
function latLonToVec3(lat, lon, r = RADIUS) {
  const phi   = (90 - lat) * (Math.PI / 180);
  const theta = (lon + 180) * (Math.PI / 180);
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta),
  );
}

// Scene setup
const canvas   = document.getElementById('twin-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 3, 12);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance   = 7;
controls.maxDistance   = 20;

scene.add(new THREE.AmbientLight(0x223366, 1.4));
const dirLight = new THREE.DirectionalLight(0x00c8ff, 0.6);
dirLight.position.set(5, 8, 5);
scene.add(dirLight);

// Globe
const globeMat = new THREE.MeshPhongMaterial({ color: 0x040d24, emissive: 0x0a1433, transparent: true, opacity: 0.92 });
scene.add(new THREE.Mesh(new THREE.SphereGeometry(RADIUS, 64, 64), globeMat));
scene.add(new THREE.Mesh(new THREE.SphereGeometry(RADIUS + 0.01, 32, 32), new THREE.MeshBasicMaterial({ color: 0x0a2040, wireframe: true, transparent: true, opacity: 0.18 })));

// Stars
const starGeo  = new THREE.BufferGeometry();
const starVerts = [];
for (let i = 0; i < 3000; i++) starVerts.push((Math.random()-0.5)*300, (Math.random()-0.5)*300, (Math.random()-0.5)*300);
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x4488cc, size: 0.12 })));

function congestionColor(cong) {
  if (cong < 0.35) return new THREE.Color(0x00ff9d);
  if (cong < 0.55) return new THREE.Color(0xff8c00);
  return new THREE.Color(0xff3b5c);
}

const hubMeshes = {};
const hubPositions = {};
Object.entries(HUBS).forEach(([id, hub]) => {
  const pos = latLonToVec3(hub.lat, hub.lon);
  hubPositions[id] = pos;

  const mat = new THREE.MeshPhongMaterial({ color: congestionColor(hub.cong), emissive: congestionColor(hub.cong), emissiveIntensity: 0.45 });
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.18, 20, 20), mat);
  mesh.position.copy(pos);
  mesh.userData = { id, ...hub };
  scene.add(mesh);
  hubMeshes[id] = mesh;
});

// Edges & Arc Logic
function arcPoints(p1, p2, segments = 40) {
  const points = [];
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const p = new THREE.Vector3().lerpVectors(p1, p2, t);
    const nudge = 1 + 0.18 * Math.sin(Math.PI * t);
    points.push(p.normalize().multiplyScalar(RADIUS * nudge));
  }
  return points;
}

const edgeMat = new THREE.LineBasicMaterial({ color: 0x005f8a, transparent: true, opacity: 0.55 });
let activeArcMesh = null;
EDGES.forEach(([a, b]) => scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(arcPoints(hubPositions[a], hubPositions[b])), edgeMat)));

let animArc = null, animProgress = 0;
const bead = new THREE.Mesh(new THREE.SphereGeometry(0.08, 10, 10), new THREE.MeshBasicMaterial({ color: 0x00ffa0 }));
bead.visible = false;
scene.add(bead);

function drawActiveRoute(fromId, toId) {
  if (activeArcMesh) { scene.remove(activeArcMesh); activeArcMesh = null; }
  const p1 = hubPositions[fromId];
  const p2 = hubPositions[toId];
  if (!p1 || !p2) return;

  const pts = arcPoints(p1, p2, 80);
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color: 0x00ff9d, linewidth: 2, transparent: true, opacity: 0.9 });
  activeArcMesh = new THREE.Line(geo, mat);
  scene.add(activeArcMesh);

  animArc = pts;
  animProgress = 0;
}

// Side Panel UI functions
function renderHubList() {
  const container = document.getElementById('hub-list');
  container.innerHTML = Object.entries(HUBS).map(([id, hub]) => `
    <div class="hub-card" id="hub-card-${id}" onclick="focusHub('${id}')">
      <div class="hub-name">${hub.name}</div>
      <div class="hub-stats">
        <span class="stat-badge load">Load ${(hub.load * 100).toFixed(0)}%</span>
        <span class="stat-badge cong" style="background:${"#"+congestionColor(hub.cong).getHexString()}33; color:${"#"+congestionColor(hub.cong).getHexString()}">Cong ${(hub.cong * 100).toFixed(0)}%</span>
        <span class="stat-badge conn">Links ${hub.conn}</span>
      </div>
    </div>`).join('');
  localStorage.setItem('rls_hubs_cache', JSON.stringify(HUBS));
}

function loadHubCache() {
  const cache = localStorage.getItem('rls_hubs_cache');
  if (cache) {
    const data = JSON.parse(cache);
    Object.assign(HUBS, data);
    renderHubList();
  }
}

window.focusHub = function(id) {
  document.querySelectorAll('.hub-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById(`hub-card-${id}`);
  if(card) card.classList.add('active');
  const hub = HUBS[id];
  controls.target.lerp(hubPositions[id], 0.6);
  controls.update();

  const tt = document.getElementById('hub-tooltip');
  document.getElementById('tt-name').textContent = hub.name;
  document.getElementById('tt-load').textContent = (hub.load * 100).toFixed(0) + '%';
  document.getElementById('tt-cong').textContent = (hub.cong * 100).toFixed(0) + '%';
  tt.style.display = 'block';
  tt.style.left = '330px';
  tt.style.top  = '120px';
  addLog(`🔍 Inspecting ${hub.name}`);
}

function addLog(msg) {
  const log = document.getElementById('activity-log');
  const now = new Date().toLocaleTimeString('en-ZA', { hour12: false });
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="ts">${now}</span>${msg}`;
  log.prepend(entry);
  if (log.children.length > 30) log.lastChild.remove();
}

window.dispatchRoute = async function() {
  const from = document.getElementById('from-hub').value;
  const to   = document.getElementById('to-hub').value;
  if (from === to) { addLog('⚠️ Select different hubs'); return; }

  addLog(`⟳ Computing Autonomous GNN path: ${from} → ${to}...`);

  const fromHub = HUBS[from], toHub = HUBS[to];
  const baseCost = Math.abs(fromHub.lat - toHub.lat) * 40 + Math.abs(fromHub.lon - toHub.lon) * 40;
  const adjustment = ((fromHub.cong + toHub.cong) / 2);
  
  const cost = parseFloat((baseCost * (1 + adjustment)).toFixed(1));
  const conf = parseInt((1 - adjustment) * 100);

  await new Promise(r => setTimeout(r, 800)); // Simulate thinking
  window.parent.postMessage({ type: 'dispatch_triggered', from, to }, '*');

  document.getElementById('res-route').textContent = `${fromHub.name.split(' ')[0]} → ${toHub.name.split(' ')[0]}`;
  document.getElementById('res-cost').textContent  = cost.toFixed(1) + ' km-e';
  document.getElementById('res-conf').textContent  = conf + '%';
  document.getElementById('res-adj').textContent   = '+' + (adjustment * 100).toFixed(1) + '%';
  document.getElementById('route-result').style.display = 'block';

  addLog(`✅ Autonomous Result: conf ${conf}% | route mapped.`);
  drawActiveRoute(from, to);
};

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
canvas.addEventListener('click', (e) => {
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(Object.values(hubMeshes));
  if (hits.length > 0) focusHub(hits[0].object.userData.id);
});

// Live Fleet Simulation Fetch
const vehicleGroup = new THREE.Group();
scene.add(vehicleGroup);
let activeVehicles = {};

async function fetchMockData() {
  try {
    const hRes = await fetch(`${API_BASE}/hubs`);
    const hData = await hRes.json();
    if(hData.success) {
      hData.data.forEach(hh => {
        if(HUBS[hh.hub_id]) {
          HUBS[hh.hub_id].load = hh.load_factor;
          HUBS[hh.hub_id].cong = hh.congestion_score;
          const col = congestionColor(hh.congestion_score);
          hubMeshes[hh.hub_id].material.color.copy(col);
          hubMeshes[hh.hub_id].material.emissive.copy(col);
        }
      });
      renderHubList();
    }

    const fRes = await fetch(`${API_BASE}/fleet`);
    const fData = await fRes.json();
    let currentVids = new Set();
    fData.forEach(v => {
      currentVids.add(v.vehicle_id);
      if(!activeVehicles[v.vehicle_id]) {
        const mesh = new THREE.Mesh(
          new THREE.BoxGeometry(0.06, 0.06, 0.12), 
          new THREE.MeshBasicMaterial({ color: 0x00ff9d })
        );
        activeVehicles[v.vehicle_id] = { 
          mesh, lat: v.latitude, lon: v.longitude, 
          speed: v.speed_kmh, heading: v.heading_deg 
        };
        vehicleGroup.add(mesh);
      }
      const vObj = activeVehicles[v.vehicle_id];
      vObj.lat_target = v.latitude;
      vObj.lon_target = v.longitude;
      vObj.speed = v.speed_kmh;
      vObj.heading = v.heading_deg;
    });

    Object.keys(activeVehicles).forEach(k => {
      if(!currentVids.has(k)) {
        vehicleGroup.remove(activeVehicles[k].mesh);
        delete activeVehicles[k];
      }
    });
  } catch(e) {}
}

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  Object.values(hubMeshes).forEach(m => m.scale.setScalar(1 + 0.06 * Math.sin(t * 2 + m.position.x)));

  Object.values(activeVehicles).forEach(v => {
    // Predictive Dead Reckoning: Keep moving even if pings are slow
    const speedFactor = (v.speed / 36000) * 0.016; // rough deg per frame
    const rad = v.heading * (Math.PI / 180);
    v.lat += Math.cos(rad) * speedFactor;
    v.lon += Math.sin(rad) * speedFactor;

    // Smoothly interpolate toward last known target lat/lon
    if (v.lat_target !== undefined) {
      v.lat += (v.lat_target - v.lat) * 0.05;
      v.lon += (v.lon_target - v.lon) * 0.05;
    }

    const pos = latLonToVec3(v.lat, v.lon, 5.08);
    v.mesh.position.copy(pos);
    v.mesh.lookAt(new THREE.Vector3().copy(pos).multiplyScalar(1.1));
  });

  if (animArc) {
    bead.visible = true;
    animProgress = (animProgress + 0.004) % 1;
    const idx = Math.floor(animProgress * (animArc.length - 1));
    bead.position.copy(animArc[idx]);
  }

  if (!controls.isInteracting) scene.rotation.y += 0.0008;

  controls.update();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

loadHubCache();
renderHubList();
addLog('🚀 Digital Twin initialised');
addLog('🧠 GNN Routing Engine connected');
fetchMockData();
setInterval(fetchMockData, 3000);
animate();
</script>
</body>
</html>
