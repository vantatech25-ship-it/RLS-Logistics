# Railway deployment config for RLS Logistics
# Deploy with: railway up
# Docs: https://docs.railway.app

services:
  "routing-engine":
    source: ./routing-engine
    build:
      dockerfile: Dockerfile
    deploy:
      numReplicas: 1
      sleepApplication: false
    variables:
      RUST_LOG: routing_engine=info
      GNN_SIDECAR_URL: ${{ "gnn-sidecar".RAILWAY_PRIVATE_URL }}
    ports:
      - target: 3000

  "gnn-sidecar":
    source: ./routing-engine
    build:
      dockerfile: Dockerfile.gnn
    ports:
      - target: 8000

  orchestration:
    source: ./orchestration
    build:
      dockerfile: Dockerfile
    variables:
      ROUTING_ENGINE_URL: ${{ "routing-engine".RAILWAY_PRIVATE_URL }}
      TIMESCALE_DSN: ${{ timescaledb.DATABASE_URL }}
      PINECONE_INDEX: rls-logistics-hubs
      PINECONE_API_KEY: ${{ PINECONE_API_KEY }}
    startCommand: uvicorn orchestrator:app --host 0.0.0.0 --port 8002

  dashboard:
    source: ./dashboard
    build:
      dockerfile: Dockerfile
    variables:
      TIMESCALE_DSN: ${{ timescaledb.DATABASE_URL }}
      ROUTING_ENGINE_URL: ${{ "routing-engine".RAILWAY_PRIVATE_URL }}
    ports:
      - target: 8000

  "digital-twin":
    source: ./core-digital-twin
    variables:
      ROUTING_ENGINE_URL: https://${{ "routing-engine".RAILWAY_PUBLIC_DOMAIN }}
    ports:
      - target: 80
