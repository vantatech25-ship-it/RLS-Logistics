version: "3.9"

services:

  # ─── Rust GNN Routing Engine ───────────────────────────────────────────────
  routing-engine:
    build:
      context: ./routing-engine
      dockerfile: Dockerfile
    container_name: rls_routing_engine
    ports:
      - "3000:3000"
    environment:
      RUST_LOG: routing_engine=info
      GNN_SIDECAR_URL: http://gnn-sidecar:8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - rls-net

  # ─── GNN AI Sidecar (GraphSAGE Model) ─────────────────────────────────────
  gnn-sidecar:
    build:
      context: ./routing-engine
      dockerfile: Dockerfile.gnn
    container_name: rls_gnn_sidecar
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - rls-net

  # ─── TimescaleDB (PostgreSQL + time-series extension) ──────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: rls_timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rls_user
      POSTGRES_PASSWORD: rls_pass
      POSTGRES_DB: rls_logistics
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rls_user -d rls_logistics"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rls-net

  # ─── LangGraph Orchestrator ────────────────────────────────────────────────
  orchestration:
    build:
      context: ./orchestration
      dockerfile: Dockerfile
    container_name: rls_orchestrator
    depends_on:
      routing-engine:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      ROUTING_ENGINE_URL: http://routing-engine:3000
      TIMESCALE_DSN: postgresql://rls_user:rls_pass@timescaledb:5432/rls_logistics
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_INDEX: rls-logistics-hubs
    restart: unless-stopped
    networks:
      - rls-net

  # ─── Digital Twin (Three.js served via Nginx) ──────────────────────────────
  digital-twin:
    build:
      context: ./core-digital-twin
      dockerfile: Dockerfile
    container_name: rls_digital_twin
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - rls-net

  # ─── KPI Metrics Dashboard (Python FastAPI) ────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: rls_dashboard
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      TIMESCALE_DSN: postgresql://rls_user:rls_pass@timescaledb:5432/rls_logistics
      ROUTING_ENGINE_URL: http://routing-engine:3000
    restart: unless-stopped
    networks:
      - rls-net

volumes:
  timescale_data:

networks:
  rls-net:
    driver: bridge
